<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="400" height="400" fill="url(#bgGrad)" rx="20"/>
  
  <circle cx="200" cy="200" r="120" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.3"/>
  <circle cx="200" cy="200" r="90" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.5"/>
  <circle cx="200" cy="200" r="60" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.7"/>
  <circle cx="200" cy="200" r="30" fill="url(#accentGrad)" opacity="0.8"/>
  <circle cx="200" cy="200" r="15" fill="#0d0d12"/>
  
  <g filter="url(#glow)" transform="translate(200, 200)">
    <rect x="-60" y="-3" width="120" height="6" rx="3" fill="url(#accentGrad)">
      <animate attributeName="height" values="6;12;6" dur="0.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="-45" y="-15" width="8" height="30" rx="4" fill="url(#accentGrad)">
      <animate attributeName="height" values="30;20;30" dur="0.6s" repeatCount="indefinite"/>
    </rect>
    <rect x="-30" y="-20" width="8" height="40" rx="4" fill="url(#accentGrad)">
      <animate attributeName="height" values="40;15;40" dur="0.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="-15" y="-25" width="8" height="50" rx="4" fill="url(#accentGrad)">
      <animate attributeName="height" values="50;25;50" dur="0.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="-22" width="8" height="44" rx="4" fill="url(#accentGrad)">
      <animate attributeName="height" values="44;18;44" dur="0.85s" repeatCount="indefinite"/>
    </rect>
    <rect x="15" y="-18" width="8" height="36" rx="4" fill="url(#accentGrad)">
      <animate attributeName="height" values="36;22;36" dur="0.75s" repeatCount="indefinite"/>
    </rect>
    <rect x="30" y="-12" width="8" height="24" rx="4" fill="url(#accentGrad)">
      <animate attributeName="height" values="24;10;24" dur="0.65s" repeatCount="indefinite"/>
    </rect>
    <rect x="45" y="-8" width="8" height="16" rx="4" fill="url(#accentGrad)">
      <animate attributeName="height" values="16;8;16" dur="0.55s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <text x="200" y="350" font-family="system-ui, sans-serif" font-size="14" fill="#a0a0b0" text-anchor="middle">音乐播放器</text>
</svg>
